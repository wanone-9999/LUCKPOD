<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>渴飲 ✕ 幸運扭蛋</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff;font-family:'Noto Sans TC',sans-serif;overflow:hidden;user-select:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
  #header{display:flex;flex-direction:column;align-items:center;margin-bottom:4px}
  #header img{height:48px;margin-bottom:2px}
  #header .subtitle{font-size:20px;font-weight:800;color:#5a4a3a;letter-spacing:6px}
  #hint{font-size:13px;font-weight:700;color:#9a8a7a;letter-spacing:3px;margin-bottom:4px;text-align:center;height:20px}
  #arena{position:relative;width:800px;height:400px;border-radius:24px;background:linear-gradient(180deg,#faf6f0,#f5efe6);box-shadow:0 2px 16px rgba(160,140,110,0.12);border:2px solid rgba(200,185,160,0.25);overflow:hidden;transition:transform 0.05s ease}
  .capsule-wrap{position:absolute;pointer-events:none}
  .capsule-shadow{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border-radius:50%;background:rgba(180,155,120,0.3);pointer-events:none}
  .capsule-ball{position:absolute;top:0;left:0;cursor:pointer;pointer-events:auto}
  .capsule-wrap.faded{opacity:0.12}.capsule-wrap.faded .capsule-ball{pointer-events:none}
  #controls{display:flex;align-items:center;gap:12px;margin-top:8px;width:800px;padding:0 8px}
  .reset-btn{width:44px;height:44px;border-radius:50%;background:transparent;border:2.5px solid #c0b0a0;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .reset-btn:hover{border-color:#8a7a6a}
  .circle-btn{height:50px;border-radius:50%;border:3px solid;color:#fff;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:all 0.2s;line-height:1}
  .circle-btn:hover{transform:scale(1.05)}.circle-btn:disabled{opacity:0.4;cursor:default;transform:none}
  #counter{margin-top:8px;font-size:22px;font-weight:800;color:#5a4a3a;letter-spacing:2px}
  #pick-select{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:80;background:rgba(250,246,240,0.95);backdrop-filter:blur(4px)}
  #pick-select.show{display:flex}
  #pick-select .ps-title{font-size:18px;font-weight:700;color:#5a4a3a;letter-spacing:3px;margin-bottom:24px}
  #pick-select .ps-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:600px}
  .ps-btn{width:120px;height:80px;border-radius:20px;border:3px solid rgba(200,185,160,0.35);background:#fff;color:#5a4a3a;font-size:24px;font-weight:800;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,0.06)}
  .ps-btn:hover{border-color:#E05B5B;color:#E05B5B;transform:scale(1.08)}
  .ps-btn:active{transform:scale(0.96)}
  .ps-btn:disabled{opacity:0.25;cursor:default;transform:none;box-shadow:none}
  #reveal{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;overflow:auto}
  #reveal.show{display:flex}
  #reveal-cards{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;padding:12px 20px;align-items:flex-start}
  .reveal-card{display:flex;flex-direction:column;align-items:center;text-align:center;opacity:0;transform:scale(0.5);transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1)}
  .reveal-card.visible{opacity:1;transform:scale(1)}
  .reveal-card .emojis{font-size:20px;margin-top:6px;letter-spacing:3px}
  .reveal-card .prize-name{font-weight:800;color:#4a3a2a;letter-spacing:2px;margin-top:4px}
  .reveal-card .prize-title{font-weight:600;color:#5a4a3a;margin-top:4px;line-height:1.5}
  .reveal-card .prize-desc{color:#8a7a6a;margin-top:3px;line-height:1.5}
  /* Compact summary row for 5+ */
  .summary-row{display:flex;align-items:center;gap:16px;padding:10px 20px;opacity:0;transform:translateY(10px);transition:all 0.4s ease}
  .summary-row.visible{opacity:1;transform:translateY(0)}
  .summary-item{display:flex;align-items:baseline;gap:4px}
  .summary-item .s-name{font-size:28px;font-weight:900;color:#4a3a2a;letter-spacing:1px}
  .summary-item .s-count{font-size:30px;font-weight:900;color:#E05B5B}
  .summary-item .s-title{font-size:14px;color:#8a7a6a;margin-left:2px}
  .summary-divider{width:1px;height:28px;background:rgba(200,185,160,0.3)}
  .done-btn{margin-top:10px;margin-bottom:10px;padding:14px 52px;font-size:18px;font-weight:700;color:#fff;background:#E05B5B;border:none;border-radius:50px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;box-shadow:0 3px 12px rgba(224,91,91,0.3);letter-spacing:3px;opacity:0;transition:opacity 0.4s 0.3s ease;flex-shrink:0}
  .done-btn.visible{opacity:1}.done-btn:hover{background:#d04a4a}
  #pick-counter{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:900;color:#5a4a3a;letter-spacing:2px;display:none;z-index:50}
  #pick-counter.show{display:block}
  #lock-screen{position:fixed;inset:0;z-index:800;display:none;flex-direction:column;align-items:center;justify-content:center;background:#fff;cursor:pointer}
  #lock-screen.show{display:flex}
  #lock-screen img{height:80px;margin-bottom:6px}
  #lock-screen .lock-text{font-size:36px;font-weight:900;color:#E05B5B;letter-spacing:8px;margin-top:16px;animation:jackpotBlink 1.2s infinite}
  #lock-screen .lock-hint{font-size:11px;color:#ddd;margin-top:60px}
  #settings-overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);backdrop-filter:blur(6px)}
  #settings-overlay.show{display:flex}
  #settings-modal{background:#faf6f0;border-radius:20px;width:min(480px,92vw);max-height:88vh;display:flex;flex-direction:column;border:2px solid rgba(200,185,160,0.3);box-shadow:0 20px 60px rgba(0,0,0,0.12)}
  .settings-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 10px}
  .settings-head span{font-size:18px;font-weight:700;color:#5a4a3a}
  .x-btn{background:none;border:none;color:#b0a090;font-size:20px;cursor:pointer}
  #prize-list{flex:1;overflow:auto;padding-bottom:4px}
  .s-row{display:flex;gap:8px;align-items:center;padding:6px 20px}
  .s-row input{padding:0 10px;font-size:13px;font-family:'Noto Sans TC',sans-serif;background:#fff;border:2px solid rgba(200,185,160,0.25);border-radius:10px;color:#5a4a3a;outline:none}
  .s-row input:focus{border-color:rgba(200,185,160,0.5)}
  .s-emoji{width:40px;height:38px;text-align:center;font-size:18px}
  .s-name{flex:1;height:38px;min-width:0}
  .s-qty{width:52px;height:38px;text-align:center}
  .s-qty-label{font-size:11px;color:#b0a090;width:20px}
  .s-rm{background:none;border:none;color:#c0a090;font-size:13px;cursor:pointer;width:24px}
  .s-divider{height:1px;background:rgba(200,185,160,0.15);margin:4px 20px}
  .s-col-labels{display:flex;gap:8px;padding:8px 20px 2px;font-size:10px;color:#b0a090}
  .s-total{padding:6px 20px;font-size:12px;color:#8a7a6a;text-align:right}
  .add-btn{margin:4px 20px;padding:9px 0;font-size:13px;background:rgba(200,185,160,0.08);border:2px dashed rgba(200,185,160,0.3);border-radius:12px;color:#a09080;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
  .save-btn{margin:8px 20px 18px;padding:13px 0;font-size:15px;font-weight:700;background:#E05B5B;border:none;border-radius:14px;color:#fff;cursor:pointer;font-family:'Noto Sans TC',sans-serif;letter-spacing:3px;box-shadow:0 3px 12px rgba(224,91,91,0.25)}
  #empty-msg{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#a09080;display:none}
  #empty-msg.show{display:block}
  .jp-section{margin:8px 20px;padding:14px 16px;background:rgba(224,91,91,0.06);border:1.5px solid rgba(224,91,91,0.15);border-radius:14px}
  .jp-title{font-size:13px;font-weight:700;color:#c04a4a;margin-bottom:8px}
  .jp-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .jp-row label{font-size:12px;color:#8a7a6a}
  .jp-row input{width:48px;height:32px;text-align:center;font-size:13px;font-family:'Noto Sans TC',sans-serif;background:#fff;border:2px solid rgba(200,185,160,0.25);border-radius:8px;color:#5a4a3a;outline:none}
  .jp-status{font-size:12px;color:#5a4a3a;margin-top:4px;padding:6px 10px;background:rgba(255,255,255,0.5);border-radius:8px}
  .jp-reset-btn{margin-top:6px;padding:6px 14px;font-size:11px;background:rgba(200,185,160,0.15);border:1.5px solid rgba(200,185,160,0.3);border-radius:8px;color:#8a7a6a;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
  #pw-overlay{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);backdrop-filter:blur(6px)}
  #pw-overlay.show{display:flex}
  #pw-modal{background:#faf6f0;border-radius:16px;padding:28px 32px;text-align:center;border:2px solid rgba(200,185,160,0.3);box-shadow:0 20px 60px rgba(0,0,0,0.12)}
  #pw-modal .pw-title{font-size:16px;font-weight:700;color:#5a4a3a;margin-bottom:14px}
  #pw-input{width:160px;height:44px;text-align:center;font-size:20px;font-family:'Noto Sans TC',sans-serif;background:#fff;border:2px solid rgba(200,185,160,0.3);border-radius:12px;color:#5a4a3a;outline:none;letter-spacing:8px}
  #pw-input:focus{border-color:#D4A833}
  #pw-input.wrong{border-color:#E05B5B;animation:pwShake 0.4s ease}
  #pw-msg{font-size:12px;color:#E05B5B;margin-top:8px;height:18px}
  
  @keyframes jackpotBlink{0%,100%{color:#E05B5B;text-shadow:0 0 8px rgba(212,168,51,0.3)}25%{color:#ff3333;text-shadow:0 0 25px rgba(255,215,0,0.8),0 0 50px rgba(255,165,0,0.4)}50%{color:#E05B5B;text-shadow:0 0 8px rgba(212,168,51,0.3)}75%{color:#ff3333;text-shadow:0 0 25px rgba(255,215,0,0.8),0 0 50px rgba(255,165,0,0.4)}}
  @keyframes pwShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
</style>
</head>

<script>
const COLORS=["#E05B5B","#3EAD8E","#E8953A","#4A9FE0","#D4A833","#9B6BC4","#E07BA2","#5BBDE0","#E88B72","#6BC4A6","#C4A64E","#7BA0D4","#D47BA0","#72C4D4","#A0D47B","#D4727B"];
const STORAGE_KEY="keyin_gashapon_v2";const SETTINGS_PW="3636";
const EMOJI_POOL=["🎉","🎊","🌈","🎏","✨","⭐","🍋","🎈","🍀","🌱","😊","💕","🌿","😌","💰","🎫","✌️","🤗","💖","🙏","🧋","🎁","🌟","🔥","💎","🏆","🎯","🥳","🫶","❤️","💫","🍵","🫧","☘️","🪄","🎪","🎠","🧧","🎐","🌸"];
function randomEmojis(){const c=3+Math.floor(Math.random()*3);return[...EMOJI_POOL].sort(()=>Math.random()-0.5).slice(0,c);}
const SHEETS_API="https://script.google.com/macros/s/AKfycbyJNusbRjuPhU9OS57mRKxzX7Kds6FO-uU9eo_46_PHuzYP9XQrTK3MAqNgMzWTKgx_XA/exec";
let drawCounter=0;

// ── Sound effects (Web Audio API) ──
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playShakeSound(){const ctx=getAudio();const dur=1.5;const bufSize=ctx.sampleRate*dur;const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);const data=buf.getChannelData(0);for(let i=0;i<bufSize;i++){const t=i/ctx.sampleRate;const burst=Math.sin(t*40)*0.5+0.5;data[i]=(Math.random()*2-1)*burst*0.15*Math.max(0,1-t/dur);}const src=ctx.createBufferSource();src.buffer=buf;const gain=ctx.createGain();gain.gain.value=0.3;src.connect(gain);gain.connect(ctx.destination);src.start();}
function playRevealSound(){const ctx=getAudio();[523.25,783.99].forEach((freq,i)=>{const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type="sine";osc.frequency.value=freq;gain.gain.setValueAtTime(0.3,ctx.currentTime+i*0.15);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.8);osc.connect(gain);gain.connect(ctx.destination);osc.start(ctx.currentTime+i*0.15);osc.stop(ctx.currentTime+i*0.15+0.8);});}
function playJackpotSound(){const ctx=getAudio();[523.25,659.25,783.99,1046.5].forEach((freq,i)=>{const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type="triangle";osc.frequency.value=freq;gain.gain.setValueAtTime(0.35,ctx.currentTime+i*0.12);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+1);osc.connect(gain);gain.connect(ctx.destination);osc.start(ctx.currentTime+i*0.12);osc.stop(ctx.currentTime+i*0.12+1);});}

// ── Google Sheets logging ──
function logToSheets(pickedResults){if(!SHEETS_API)return;drawCounter++;const now=new Date();const date=now.toLocaleDateString("zh-TW");const time=now.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});const drawId=date.replace(/\//g,"")+"-"+time.replace(/:/g,"").replace(/ /g,"")+"-"+drawCounter;const counts={};pickedResults.forEach(p=>{counts[p.prize.name]=(counts[p.prize.name]||0)+1;});const records=Object.keys(counts).map(name=>({drawId,date,time,name,count:counts[name],batchNum:jpCurrentBatch,totalBatches:totalRefills}));fetch(SHEETS_API,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({records})}).catch(()=>{});}

const JACKPOT_PRIZE={name:"大吉",qty:1,title:"太棒了!!<br>下次任消費折$15",description:"今天你就是幸運小錦鯉！",emojis:["🎊","🌈","🎏"]};
const DEFAULT_PRIZES=[
  {name:"中吉",qty:4,title:"太棒了!!下次來消費<br>免費加蜂蜜香檸凍($15)",description:"最推薦 搭配 蜜香紅茶 或 香末翠綠茶",emojis:["✨","⭐","🍋","🎈"]},
  {name:"小吉",qty:6,title:"今天小吉，下次就會抽大吉！<br>下次任消費折$5元～",description:"多張疊加無上限!<br>喝著喝著，就能喝出傳說中的大獎！",emojis:["🍀","🌱","😊","💕","🌿"]},
  {name:"普獎",qty:3,title:"下次任消費95折",description:"沒中大獎<br>但錢包先喘一口氣<br><br><span style='font-size:0.85em;color:#6b7280'>小提醒：<br>優惠券一次使用一張</span>",emojis:["😌","💰","🎫","✌️"]},
  {name:"感謝有您",qty:2,title:"「不是『銘謝惠顧』，是『感謝有您』！」",description:"「您中了這張，其實比中大獎還讚」<br>收集 3 張→兌換 $35 純茶一杯",emojis:["🤗","💖","🙏","💕"]}
];
function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){const s=JSON.parse(r);return{prizes:s.prizes||JSON.parse(JSON.stringify(DEFAULT_PRIZES)),jpCycle:s.jpCycle||5,jpCurrentBatch:s.jpCurrentBatch||0,totalRefills:s.totalRefills||0};}}catch(e){}return{prizes:JSON.parse(JSON.stringify(DEFAULT_PRIZES)),jpCycle:5,jpCurrentBatch:0,totalRefills:0};}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({prizes,jpCycle,jpCurrentBatch,totalRefills}));}catch(e){}}
let state=loadState();let prizes=state.prizes,jpCycle=state.jpCycle,jpCurrentBatch=state.jpCurrentBatch,totalRefills=state.totalRefills,jpCycleDraft=jpCycle;
const W=800,H=400,BALL_R=38,FLOOR=H-45;
let balls=[],phase="idle",raf=null,pickedBalls=[];let pickTotal=2,shakeTime=0,pwCallback=null;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildPool(){const pool=[];for(const p of prizes)for(let i=0;i<p.qty;i++)pool.push(p);jpCurrentBatch++;totalRefills++;if(jpCurrentBatch>=jpCycle){let replaced=false;for(let i=pool.length-1;i>=0;i--){if(pool[i].name===prizes[prizes.length-1].name){pool[i]=JACKPOT_PRIZE;replaced=true;break;}}if(!replaced&&pool.length>0)pool[pool.length-1]=JACKPOT_PRIZE;jpCurrentBatch=0;}saveState();return shuffle(pool);}
function initBalls(){const arena=document.getElementById("arena");arena.querySelectorAll(".capsule-wrap").forEach(el=>el.remove());balls=[];const pool=buildPool();if(pool.length===0){updateCounter();document.getElementById("empty-msg").classList.add("show");return;}
  for(let i=0;i<pool.length;i++){const cols=5,row=Math.floor(i/cols),col=i%cols;const spacingX=W/(cols+1);balls.push({id:i,x:spacingX*(col+0.5+Math.random()*0.5),y:20+row*60+Math.random()*25,vx:(Math.random()-0.5)*3,vy:Math.random()*2,r:BALL_R,colorIdx:i%COLORS.length,rotation:Math.random()*Math.PI*2,vr:(Math.random()-0.5)*0.008,alive:true,prize:pool[i],wrap:null,ballEl:null,shadowEl:null});}
  balls.forEach(b=>{const wrap=document.createElement("div");wrap.className="capsule-wrap";wrap.style.width=(b.r*2)+"px";wrap.style.height=(b.r*2+16)+"px";const shadow=document.createElement("div");shadow.className="capsule-shadow";shadow.style.width=(b.r*1.4)+"px";shadow.style.height=(b.r*0.3)+"px";wrap.appendChild(shadow);const bd=document.createElement("div");bd.className="capsule-ball";bd.style.width=(b.r*2)+"px";bd.style.height=(b.r*2)+"px";bd.innerHTML=makeSVG(b.r,b.colorIdx,b.id);bd.addEventListener("click",()=>onBallClick(b.id));wrap.appendChild(bd);arena.appendChild(wrap);b.wrap=wrap;b.ballEl=bd;b.shadowEl=shadow;});
  updateCounter();document.getElementById("empty-msg").classList.remove("show");}
function makeSVG(r,ci,id){const s=r*2,c=COLORS[ci%COLORS.length];return`<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}"><defs><clipPath id="bt-${id}"><rect x="0" y="${r}" width="${s}" height="${r}"/></clipPath><clipPath id="tp-${id}"><rect x="0" y="0" width="${s}" height="${r}"/></clipPath></defs><circle cx="${r}" cy="${r}" r="${r-1}" fill="${c}" clip-path="url(#bt-${id})"/><circle cx="${r}" cy="${r}" r="${r-1}" fill="#FFFFFF" clip-path="url(#tp-${id})"/><circle cx="${r}" cy="${r}" r="${r-1}" fill="none" stroke="#4a3a2a" stroke-width="2.5"/><line x1="1" y1="${r}" x2="${s-1}" y2="${r}" stroke="#4a3a2a" stroke-width="2"/><ellipse cx="${r*0.72}" cy="${r*0.6}" rx="${r*0.22}" ry="${r*0.13}" fill="rgba(255,255,255,0.45)" transform="rotate(-15,${r*0.72},${r*0.6})"/></svg>`;}
function physicsLoop(){const g=0.4,bounce=0.45,f=0.988;const shaking=phase==="shaking";const isIdle=phase==="idle";const alive=balls.filter(b=>b.alive);let sox=0,soy=0;
  if(shaking){shakeTime++;sox=Math.sin(shakeTime*0.8)*12+(Math.random()-0.5)*8;soy=Math.cos(shakeTime*1.1)*8+(Math.random()-0.5)*6;document.getElementById("arena").style.transform=`translate(${sox*0.3}px,${soy*0.3}px)`;}else{document.getElementById("arena").style.transform="";}
  for(const b of alive){b.vy+=g;if(shaking){b.vx+=(Math.random()-0.5)*3;b.vy+=(Math.random()-0.5)*3;}b.vx*=f;b.vy*=f;b.x+=b.vx;b.y+=b.vy;if(isIdle){b.rotation+=0.003;}else{b.rotation+=b.vr;b.vr*=0.988;}
    if(b.y+b.r>FLOOR){b.y=FLOOR-b.r;b.vy*=-bounce;b.vr+=b.vx*0.002;if(shaking)b.vy-=Math.abs(soy)*0.5;}if(b.y-b.r<15){b.y=15+b.r;b.vy*=-bounce;}if(b.x-b.r<15){b.x=15+b.r;b.vx*=-bounce;if(shaking)b.vx+=Math.abs(sox)*0.3;}if(b.x+b.r>W-15){b.x=W-15-b.r;b.vx*=-bounce;if(shaking)b.vx-=Math.abs(sox)*0.3;}}
  for(let i=0;i<alive.length;i++)for(let j=i+1;j<alive.length;j++){const a=alive[i],b2=alive[j],dx=b2.x-a.x,dy=b2.y-a.y;const dist=Math.sqrt(dx*dx+dy*dy),minD=a.r+b2.r;if(dist<minD&&dist>0.1){const nx=dx/dist,ny=dy/dist,ov=minD-dist;a.x-=nx*ov*0.5;a.y-=ny*ov*0.5;b2.x+=nx*ov*0.5;b2.y+=ny*ov*0.5;const dvn=(a.vx-b2.vx)*nx+(a.vy-b2.vy)*ny;if(dvn>0){a.vx-=dvn*nx*bounce;a.vy-=dvn*ny*bounce;b2.vx+=dvn*nx*bounce;b2.vy+=dvn*ny*bounce;}}}
  for(const b of balls){if(!b.alive){b.wrap.style.display="none";continue;}b.wrap.style.left=(b.x-b.r)+"px";b.wrap.style.top=(b.y-b.r)+"px";b.ballEl.querySelector("svg").style.transform=`rotate(${b.rotation}rad)`;const dtf=FLOOR-(b.y+b.r);b.shadowEl.style.opacity=Math.max(0,1-(dtf/200));}
  raf=requestAnimationFrame(physicsLoop);}
function doShake(){if(phase!=="idle"||getAlive()===0)return;balls.forEach(b=>{b.vr=(Math.random()-0.5)*0.04;});phase="shaking";shakeTime=0;disableButtons(true);pickedBalls=[];document.getElementById("hint").textContent="搖晃中…";playShakeSound();setTimeout(()=>{phase="choosing";document.getElementById("arena").style.transform="";document.getElementById("hint").textContent="";showPickSelect();},1500);}
function showPickSelect(){const ps=document.getElementById("pick-select");const alive=getAlive();ps.querySelectorAll(".ps-btn").forEach(btn=>{const n=parseInt(btn.textContent);btn.disabled=n>alive;btn.style.opacity=n>alive?0.25:1;});ps.classList.add("show");}
function selectPickCount(n){pickTotal=n;document.getElementById("pick-select").classList.remove("show");phase="pick";document.getElementById("hint").textContent="CLICK BALL TO OPEN";updatePickCounter(pickTotal);}
function updatePickCounter(n){const el=document.getElementById("pick-counter");if(n>0&&phase==="pick"){el.innerHTML=`選擇扭蛋（還可以選 <span style="color:#E05B5B;font-size:32px">${n}</span> 顆）`;el.classList.add("show");}else el.classList.remove("show");}
function onBallClick(id){if(phase!=="pick")return;const b=balls.find(bb=>bb.id===id);if(!b||!b.alive)return;b.alive=false;b.wrap.style.display="none";pickedBalls.push({colorIdx:b.colorIdx,prize:b.prize});updateCounter();const needMore=pickTotal-pickedBalls.length;if(needMore>0&&getAlive()>0){updatePickCounter(needMore);return;}phase="revealed";document.getElementById("pick-counter").classList.remove("show");balls.forEach(bb=>{if(bb.alive)bb.wrap.classList.add("faded");});const hasJP=pickedBalls.some(p=>p.prize.name==="大吉");if(hasJP)playJackpotSound();else playRevealSound();logToSheets(pickedBalls);showReveal(pickedBalls);}

function showReveal(picked){
  const container=document.getElementById("reveal-cards");container.innerHTML="";
  const n=picked.length;
  const isCompact=n>=5;

  if(isCompact){
    // ── Summary mode: group by prize name, show "小吉 ×3" ──
    const counts={};const titleMap={};
    picked.forEach(p=>{
      const name=p.prize.name;
      counts[name]=(counts[name]||0)+1;
      if(!titleMap[name])titleMap[name]=p.prize.title;
    });
    // Build summary rows
    const names=Object.keys(counts);
    names.forEach((name,i)=>{
      const row=document.createElement("div");
      row.className="summary-row";
      row.style.transitionDelay=(i*0.1)+"s";
      const nameColors={"大吉":"#D4A833","中吉":"#E05B5B","小吉":"#4A9FE0","普獎":"#3EAD8E","感謝有您":"#9B6BC4"};
      const nc=nameColors[name]||"#4a3a2a";
      const isJackpot=name==="大吉";
      const nameStyle=isJackpot
        ?`font-size:36px;font-weight:900;color:#E05B5B;animation:jackpotBlink 1.2s infinite;letter-spacing:6px`
        :`font-size:28px;font-weight:900;color:${nc};letter-spacing:2px`;
      const countStyle=isJackpot
        ?`font-size:34px;font-weight:900;color:#E05B5B;animation:jackpotBlink 1.2s infinite`
        :`font-size:30px;font-weight:900;color:${nc}`;
      row.innerHTML=`
        <div style="display:flex;flex-direction:column;align-items:center;min-width:160px">
          <div style="display:flex;align-items:baseline;gap:8px">
            <span style="${nameStyle}">${name}</span>
            <span style="${countStyle}">× ${counts[name]}</span>
          </div>
          <div class="s-title" style="font-size:14px;font-weight:600;text-align:center">${titleMap[name]}</div>
        </div>
      `;
      container.appendChild(row);
    });
  } else {
    // ── Detail mode: 1-3 cards with full info ──
    const svgSize=n<=2?100:80;
    const cardW=n<=2?240:200;
    const nameFz=n<=2?18:16;
    const titleFz=n<=2?13:12;
    picked.forEach((p,i)=>{
      const color=COLORS[p.colorIdx%COLORS.length],pr=p.prize;
      const emojis=randomEmojis();
      const card=document.createElement("div");card.className="reveal-card";card.style.width=cardW+"px";card.style.transitionDelay=(i*0.06)+"s";
      const smallBall=50;const halfB=smallBall/2;
      const dcMap={"大吉":"#D4A833","中吉":"#E05B5B","小吉":"#4A9FE0","普獎":"#3EAD8E","感謝有您":"#9B6BC4"};
      const dc=dcMap[pr.name]||"#4a3a2a";
      const isJP=pr.name==="大吉";
      const dnStyle=isJP?`font-size:36px;font-weight:900;color:#E05B5B;animation:jackpotBlink 1.2s infinite;letter-spacing:6px`:`font-size:26px;font-weight:900;color:${dc};letter-spacing:2px`;
      let html=`<svg width="${smallBall}" height="${smallBall}" viewBox="0 0 ${smallBall} ${smallBall}"><defs><clipPath id="rv-bt-${i}"><rect x="0" y="${halfB}" width="${smallBall}" height="${halfB}"/></clipPath><clipPath id="rv-tp-${i}"><rect x="0" y="0" width="${smallBall}" height="${halfB}"/></clipPath></defs><circle cx="${halfB}" cy="${halfB}" r="${halfB-3}" fill="${color}" clip-path="url(#rv-bt-${i})"/><circle cx="${halfB}" cy="${halfB}" r="${halfB-3}" fill="#FFFFFF" clip-path="url(#rv-tp-${i})"/><circle cx="${halfB}" cy="${halfB}" r="${halfB-3}" fill="none" stroke="#4a3a2a" stroke-width="2"/><line x1="3" y1="${halfB}" x2="${smallBall-3}" y2="${halfB}" stroke="#4a3a2a" stroke-width="1.5"/></svg>`;
      html+=`<div style="font-size:16px;margin-top:4px">${emojis[0]}</div>`;
      html+=`<div class="prize-name" style="${dnStyle}">${pr.name}</div>`;
      html+=`<div class="prize-title" style="font-size:${titleFz}px">${pr.title}</div>`;
      if(n<=3)html+=`<div class="prize-desc" style="font-size:11px">${pr.description}</div>`;
      card.innerHTML=html;container.appendChild(card);
    });
  }

  document.getElementById("reveal").classList.add("show");
  requestAnimationFrame(()=>{
    document.querySelectorAll(".reveal-card").forEach(el=>el.classList.add("visible"));
    document.querySelectorAll(".summary-row").forEach(el=>el.classList.add("visible"));
    document.querySelector(".done-btn").classList.add("visible");
  });
}

function closeReveal(){document.getElementById("reveal").classList.remove("show");document.getElementById("reveal-cards").innerHTML="";document.querySelector(".done-btn").classList.remove("visible");balls.forEach(bb=>{if(bb.alive)bb.wrap.classList.remove("faded");});pickedBalls=[];phase="locked";document.getElementById("lock-screen").classList.add("show");}
document.getElementById("lock-screen").addEventListener("click",function(e){if(e.target.closest("a"))return;pwCallback="unlock";showPwModal();});
function unlockScreen(){document.getElementById("lock-screen").classList.remove("show");phase="idle";disableButtons(false);updateCounter();document.getElementById("hint").textContent=getAlive()>0?"":"扭蛋機已經空了";if(getAlive()===0)document.getElementById("empty-msg").classList.add("show");}
function resetAll(){document.getElementById("reveal").classList.remove("show");document.getElementById("reveal-cards").innerHTML="";document.querySelector(".done-btn").classList.remove("visible");document.getElementById("pick-counter").classList.remove("show");document.getElementById("pick-select").classList.remove("show");document.getElementById("arena").style.transform="";document.getElementById("lock-screen").classList.remove("show");pickedBalls=[];phase="idle";initBalls();disableButtons(false);document.getElementById("hint").textContent="";}
function getAlive(){return balls.filter(b=>b.alive).length;}
function updateCounter(){document.getElementById("counter").textContent=`剩餘 ${getAlive()} 顆`;}
function disableButtons(v){document.getElementById("btn-shake").disabled=v;}
function showPwModal(){document.getElementById("pw-input").value="";document.getElementById("pw-msg").textContent="";document.getElementById("pw-input").classList.remove("wrong");document.getElementById("pw-overlay").classList.add("show");setTimeout(()=>document.getElementById("pw-input").focus(),100);}
function tryOpenSettings(){pwCallback="settings";showPwModal();}
function checkPw(){const v=document.getElementById("pw-input").value;if(v===SETTINGS_PW){document.getElementById("pw-overlay").classList.remove("show");if(pwCallback==="settings")openSettings();else if(pwCallback==="unlock")unlockScreen();pwCallback=null;}else{document.getElementById("pw-input").classList.add("wrong");document.getElementById("pw-msg").textContent="密碼錯誤";setTimeout(()=>{document.getElementById("pw-input").classList.remove("wrong");document.getElementById("pw-input").value="";document.getElementById("pw-msg").textContent="";},800);}}
document.getElementById("pw-overlay").addEventListener("click",e=>{if(e.target===document.getElementById("pw-overlay")){document.getElementById("pw-overlay").classList.remove("show");pwCallback=null;}});
let settingsDraft=[];
function openSettings(){settingsDraft=JSON.parse(JSON.stringify(prizes));jpCycleDraft=jpCycle;document.getElementById("jp-cycle").value=jpCycle;renderPrizeList();updateJpStatus();document.getElementById("settings-overlay").classList.add("show");}
function closeSettings(){document.getElementById("settings-overlay").classList.remove("show");}
function renderPrizeList(){const totalQty=settingsDraft.reduce((s,p)=>s+p.qty,0);document.getElementById("prize-list").innerHTML=`<div class="s-col-labels"><span style="width:40px">符號</span><span style="flex:1">獎項名稱</span><span style="width:52px">數量</span><span style="width:20px"></span><span style="width:24px"></span></div>`+settingsDraft.map((p,i)=>`<div class="s-row"><input class="s-emoji" value="${p.emojis[0]||'🎁'}" oninput="onSI(${i},'emoji',this.value)"/><input class="s-name" value="${p.name}" oninput="onSI(${i},'name',this.value)" placeholder="名稱"/><input class="s-qty" type="number" value="${p.qty}" min="0" max="50" oninput="onSI(${i},'qty',this.value)"/><span class="s-qty-label">顆</span><button class="s-rm" onclick="rmPrize(${i})" style="opacity:${settingsDraft.length<=2?0.3:0.6}">✕</button></div>${i<settingsDraft.length-1?'<div class="s-divider"></div>':''}`).join("");document.getElementById("s-total").textContent=`每盆 ${totalQty} 顆`;}
function updateJpStatus(){const remaining=jpCycle-jpCurrentBatch;const el=document.getElementById("jp-status");if(remaining<=0){el.innerHTML=`<strong style="color:#c04a4a">⚡ 下一盆就是大吉盆！（替換 1 顆最後獎項）</strong>`;}else{el.innerHTML=`目前已補 <strong>${jpCurrentBatch}</strong> 盆，還要再補 <strong>${remaining}</strong> 盆才會出大吉<br><span style="font-size:11px;color:#a09080">（累計已補 ${totalRefills} 盆）</span>`;}}
function resetJpCounter(){jpCurrentBatch=0;totalRefills=0;saveState();updateJpStatus();}
function onSI(i,k,v){if(k==="qty")settingsDraft[i].qty=Math.max(0,Math.floor(Number(v))||0);else if(k==="emoji")settingsDraft[i].emojis[0]=v;else settingsDraft[i][k]=v;if(k==="qty")renderPrizeList();}
function addPrize(){settingsDraft.push({name:"新獎項",qty:1,title:"恭喜中獎！",description:"",emojis:["🎁"]});renderPrizeList();}
function rmPrize(i){if(settingsDraft.length<=2)return;settingsDraft.splice(i,1);renderPrizeList();}
function saveSettings(){prizes=JSON.parse(JSON.stringify(settingsDraft));jpCycle=Math.max(1,jpCycleDraft);saveState();closeSettings();resetAll();}
initBalls();raf=requestAnimationFrame(physicsLoop);
document.getElementById("settings-overlay").addEventListener("click",e=>{if(e.target===document.getElementById("settings-overlay"))closeSettings();});
</script>
</body>
</html>
